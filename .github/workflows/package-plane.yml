name: Registry package plane

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  package-plane:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Set up .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.103
      - name: Install pinned Python test harness
        shell: bash
        run: |
          python -m venv "${RUNNER_TEMP}/registry-ci-python"
          "${RUNNER_TEMP}/registry-ci-python/bin/python" -m pip install \
            --disable-pip-version-check --no-input --only-binary=:all: \
            --require-hashes --requirement eng/ci-python-requirements.txt
      - name: Verify checkout and package metadata
        shell: bash
        run: |
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test -z "$(git status --porcelain --untracked-files=all)"
          "${RUNNER_TEMP}/registry-ci-python/bin/python" -m pytest -q \
            tests/test_contract_package_metadata.py \
            tests/test_runtime_package_metadata.py \
            scripts/test_materialize_unsigned_preview_publication_delta.py
      - name: Build runtime verification
        shell: bash
        env:
          CHUMMER_REGISTRY_CONTROL_API_KEY: package-plane-ci-control-key
        run: |
          dotnet build Chummer.Hub.Registry.slnx --configuration Release --nologo
          dotnet run --project Chummer.Run.Registry.Verify/Chummer.Run.Registry.Verify.csproj --configuration Release --no-build
