turns:
  - turn: 0
    turn_id: turn_0000_seed
    state: seeded_initial_state
    receipt_id: ledger_tick_0000_seed
    headline: Six factions entered the Ledger.
    summary: Six public-safe fictional factions entered the seeded world with contested route pressure and no human stewards assigned.
    effects: []
    action_beats:
      - beat_id: turn0_player_rust_debt_probe
        actor_kind: player
        actor_label: Rust Market runners
        beat_label: Debt probe
        action_summary: A seeded player cell pushed a gear-recovery probe through Rust Bazaar and exposed old favor debt before the first public tick opened.
        stakes: If the probe failed, debt pressure would stay invisible until it became a city-wide logistics problem.
        proof_note: Proof lane seeded into ledger_tick_0000_seed as anonymous setup motion.
      - beat_id: turn0_player_ashline_reagent_pull
        actor_kind: player
        actor_label: Ashline awakened crew
        beat_label: Reagent scramble
        action_summary: A MysAd-heavy crew rushed a reagent pull and left a visible source-clarity dispute behind them.
        stakes: That scramble seeded the awakened pressure that later surfaces as package demand instead of private table lore.
        proof_note: Turn-0 setup receipt retained only aggregate awakened-pressure motion.
      - beat_id: turn0_player_neon_route_patch
        actor_kind: player
        actor_label: Neon Docks riggers
        beat_label: Route patch
        action_summary: A player-side rigger patch kept one cargo lane open but burned maintenance slack across the dock drones.
        stakes: The city stayed moving, but the repair debt guaranteed a visible turn-1 logistics beat.
        proof_note: Receipt keeps route survival, not operator identity.
      - beat_id: turn0_gm_ghostline_redaction
        actor_kind: gm
        actor_label: Ghostline field GM
        beat_label: Rumor kill
        action_summary: The seeded GM layer suppressed two rumor chains before they hardened into public package truth.
        stakes: Without the GM intervention, the board would open with false certainty instead of useful pressure.
        proof_note: Redaction-only proof logged under the turn-0 seed receipt.
      - beat_id: turn0_gm_freeward_witness_net
        actor_kind: gm
        actor_label: Free Wardens field GM
        beat_label: Witness net
        action_summary: The GM side established a witness-safe closeout net so public outcomes could be shown without exposing tables or addresses.
        stakes: This is what lets the board show consequence instead of flavor text.
        proof_note: Witness-safe posture seeded before the first public dispatch lane opened.
      - beat_id: turn0_gm_glass_gate
        actor_kind: gm
        actor_label: Glass Tower contract referee
        beat_label: Access gate
        action_summary: A seeded contract gate locked the polished districts down and forced pressure into the contested route spine.
        stakes: Turn-1 trust loss only makes sense because the gate worked too well at turn 0.
        proof_note: Contract gate posture recorded as city setup pressure, not private bureaucracy.
      - beat_id: turn0_world_contested_spine
        actor_kind: world
        actor_label: Ledger GM
        beat_label: Transit spine armed
        action_summary: The world seed primed Transit Spine and Old Signal Loop as contested choke points instead of neutral map filler.
        stakes: 'This gives the globe something to show immediately: routes, friction, and future collisions.'
        proof_note: Seed geometry and pressure lanes stamped into the initial state hash.
      - beat_id: turn0_intel_package_watch
        actor_kind: intel
        actor_label: Public Intel Provider
        beat_label: Package watchlist
        action_summary: The intel desk pre-tagged drone, awakened, and debt package watches so turn-1 motion could land as candidate work instead of a text-only headline.
        stakes: Without this, the package lane would feel disconnected from the world board.
        proof_note: Watchlist seeded as governed pressure, not roadmap truth.
    public_safe: true
  - turn: 1
    turn_id: turn_0001_preseeded
    state: preseeded_tick_complete
    receipt_id: ledger_tick_0001_preseeded
    headline: Turn 1 — The city is moving.
    summary: Debt Heat rose in Rust Bazaar while Ashline MysAd density pulled package pressure toward awakened build support.
    effects:
      - target: rust_market_syndicate
        metric: debt_heat
        delta: 8
        public_reason: Old favors were called in after a failed gear reconciliation.
      - target: ashline_circle
        metric: mysad_density
        delta: 5
        public_reason: Awakened build demand increased after a visible source-clarity dispute.
      - target: neon_docks_union
        metric: vehicle_package_demand
        delta: 4
        public_reason: Cargo-route pressure created demand for drone and vehicle overlays.
      - target: ghostline_network
        metric: false_signal_suppression
        delta: 6
        public_reason: Ghostline filtered two rumor lanes before they became package truth.
      - target: barrens_free_wardens
        metric: closeout_witnesses
        delta: 3
        public_reason: Two public-safe table outcomes were recorded as closeout witnesses.
      - target: glass_tower_compact
