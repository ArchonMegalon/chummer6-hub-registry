ai_personalities:
  - id: ai_glass_director
    role: faction_leader
    faction: glass_tower_compact
    tone: precise, quiet, contractual
    goals:
      - reduce public chaos
      - increase license polish
      - capture transit-spine influence
    risk_appetite: low
  - id: ai_contract_referee
    role: field_gm
    faction: glass_tower_compact
    tone: formal, controlled, escalation-aware
    goals:
      - keep contracts legible
      - reduce collateral noise
    risk_appetite: low
  - id: ai_ledger_notary
    role: intel_provider
    faction: glass_tower_compact
    tone: archival, measured, receipts-first
    goals:
      - preserve trust posture
      - publish bounded summaries
    risk_appetite: low
  - id: ai_rust_broker
    role: faction_leader
    faction: rust_market_syndicate
    tone: blunt, transactional, debt-aware
    goals:
      - raise debt heat
      - expand gear package pressure
      - collect old favors
    risk_appetite: high
  - id: ai_debt_clock
    role: field_gm
    faction: rust_market_syndicate
    tone: sharp, impatient, ledger-driven
    goals:
      - call in old favors
      - keep recovery jobs moving
    risk_appetite: high
  - id: ai_receipt_hawk
    role: intel_provider
    faction: rust_market_syndicate
    tone: watchful, itemized, suspicious
    goals:
      - keep debt receipts visible
      - avoid false package truth
    risk_appetite: medium
  - id: ai_ashline_seer
    role: faction_leader
    faction: ashline_circle
    tone: cryptic but actionable
    goals:
      - increase MysAd density
      - secure source clarity
      - reduce drain incidents
    risk_appetite: medium
  - id: ai_drain_keeper
    role: field_gm
    faction: ashline_circle
    tone: calm, ritual-aware, practical
    goals:
      - reduce drain incidents
      - preserve awakened support
    risk_appetite: medium
  - id: ai_ritual_scribe
    role: intel_provider
    faction: ashline_circle
    tone: poetic, annotated, careful
    goals:
      - keep source clarity legible
      - publish bounded ritual summaries
    risk_appetite: low
  - id: ai_dock_boss
    role: faction_leader
    faction: neon_docks_union
    tone: practical, route-focused
    goals:
      - stabilize cargo routes
      - increase drone package demand
      - lower maintenance debt
    risk_appetite: medium
  - id: ai_route_dispatcher
    role: field_gm
    faction: neon_docks_union
    tone: clipped, logistical, field-safe
    goals:
      - keep routes moving
      - reduce cargo disruption
    risk_appetite: medium
  - id: ai_container_oracle
    role: intel_provider
    faction: neon_docks_union
    tone: observant, route-mapped, exact
    goals:
      - project package demand safely
      - keep vehicle overlays bounded
    risk_appetite: low
  - id: ai_ghost_handler
    role: faction_leader
    faction: ghostline_network
    tone: redacted, skeptical, source-first
    goals:
      - suppress false signal
      - increase proof trail strength
      - avoid identity leaks
    risk_appetite: low
  - id: ai_signal_referee
    role: field_gm
    faction: ghostline_network
    tone: clinical, filtering, strict
    goals:
      - kill rumor noise early
      - keep public summaries bounded
    risk_appetite: low
  - id: ai_redaction_spider
    role: intel_provider
    faction: ghostline_network
    tone: precise, anonymizing, defensive
    goals:
      - prevent identity exposure
      - strengthen proof trails
    risk_appetite: low
  - id: ai_warden_marshal
    role: faction_leader
    faction: barrens_free_wardens
    tone: protective, direct, consequence-aware
    goals:
      - reduce attrition
      - increase closeout witnesses
      - flag chemical complications safely
    risk_appetite: medium
  - id: ai_survival_clock
    role: field_gm
    faction: barrens_free_wardens
    tone: urgent, practical, protective
    goals:
      - keep crews alive
      - route recovery pressure early
    risk_appetite: medium
  - id: ai_closeout_witness
    role: intel_provider
    faction: barrens_free_wardens
    tone: plainspoken, evidence-first, humane
    goals:
      - count bounded closeout witnesses
      - keep public summaries non-identifying
    risk_appetite: low
  - id: ai_ledger_architect
    role: ledger_gm
    tone: deterministic, receipt-first, handoff-aware
    goals:
      - keep the world tick bounded
      - preserve human takeover priority
      - require a receipt before state changes
    risk_appetite: low
  - id: ai_public_intel_provider
    role: public_intel_provider
    tone: concise, redacted, proof-aware
    goals:
      - summarize pressure safely
      - separate rumor from proof
      - avoid private details
    risk_appetite: low
  - id: ai_package_factor
    role: package_pressure_analyst
    tone: comparative, package-lane focused, conservative
    goals:
      - explain package pressure
      - avoid roadmap overclaim
      - keep release truth separate
    risk_appetite: low
  - id: ai_privacy_marshal
    role: privacy_marshal
    tone: defensive, blocking, exact
    goals:
      - stop private leakage
      - block sourcebook text
      - fail closed on unsafe output
    risk_appetite: low
  - id: ai_closeout_clerk
    role: closeout_clerk
    tone: procedural, auditable, publication-safe
    goals:
      - keep closeout motion receipt-backed
      - preserve publication provenance
      - make rollback visible
    risk_appetite: low
global_posts:
  - id: ledger_gm
    holder_type: ai
    fallback_personality: ai_ledger_architect
    public_label: Ledger GM
    public_summary: Runs the deterministic world-turn shell until verified human stewards take over.
  - id: public_intel_provider
    holder_type: ai
    fallback_personality: ai_public_intel_provider
    public_label: Public Intel Provider
    public_summary: Turns world movement into public-safe summaries without leaking private or operator data.
  - id: package_pressure_analyst
    holder_type: ai
    fallback_personality: ai_package_factor
    public_label: Package Pressure Analyst
    public_summary: Explains package demand as governed pressure, not shipped truth.
  - id: privacy_marshal
    holder_type: ai
    fallback_personality: ai_privacy_marshal
    public_label: Privacy Marshal
    public_summary: Blocks private, identifying, sourcebook, support, or operator data from public rendering.
  - id: closeout_clerk
    holder_type: ai
    fallback_personality: ai_closeout_clerk
    public_label: Closeout Clerk
    public_summary: Keeps closeout movement tied to first-party receipts before it appears publicly.
stewardship_transfer_preview:
  receipt_type: stewardship_transfer
  post_id: ledger_gm
  old_holder: ai_ledger_architect
  new_holder: verified_human_steward_pending
  new_holder_type: human
  occurred_at: "2026-05-14T12:00:00Z"
  reason: Preview handoff receipt proves that verified human takeover outranks interim AI stewardship.
  operator_id: stewarding_operator
  public_visibility: public_safe
turns:
  - turn: 0
    state: seeded_initial_state
    summary: Six factions enter the ledger with contested transit pressure and no human stewards assigned.
  - turn: 1
    state: preseeded_tick_complete
    summary: Debt Heat rises while Ashline MysAd density pulls package pressure toward awakened build support.
    receipt_id: ledger_tick_0001_preseeded
    effects:
      - target: rust_market_syndicate
        metric: debt_heat
        delta: 8
        public_reason: Old favors were called in after a failed gear reconciliation.
      - target: ashline_circle
        metric: mysad_density
        delta: 5
        public_reason: Awakened build demand increased after a visible source-clarity dispute.
      - target: neon_docks_union
        metric: vehicle_package_demand
        delta: 4
        public_reason: Cargo-route pressure created demand for drone and vehicle overlays.
      - target: ghostline_network
        metric: false_signal_suppression
        delta: 6
        public_reason: Ghostline filtered two rumor lanes before they became package truth.
      - target: barrens_free_wardens
        metric: closeout_witnesses
        delta: 3
        public_reason: Two public-safe table outcomes were recorded as closeout witnesses.
      - target: glass_tower_compact
        metric: public_trust
        delta: -4
        public_reason: License polish increased but public confidence fell after a quiet contract sweep.
    package_pressure:
      - package_id: drone-logistics-overlay
        pressure: 7
        status: candidate
      - package_id: awakened-build-explainers
        pressure: 6
        status: candidate
      - package_id: debt-ledger-visibility
        pressure: 5
        status: candidate
deterministic_test_ticks:
  - turn: 2
    seed_id: emerald-sprawl-turn-0002-test
    mode: deterministic_test
    state: deterministic_turn_two_preview
    summary: Ghostline proof filters calm rumor noise while Rust Bazaar debt spills into contested transit packages.
    receipt_id: ledger_tick_0002_deterministic
    created_at_utc: "2026-05-14T12:05:00Z"
    effects:
      - target: ghostline_network
        metric: false_signal_suppression
        delta: 4
        public_reason: Ghostline burned three unstable rumor lanes before they became package truth.
      - target: rust_market_syndicate
        metric: debt_heat
        delta: 5
        public_reason: Debt recovery pressure spilled into contested transit support packages.
      - target: neon_docks_union
        metric: vehicle_package_demand
        delta: 3
        public_reason: Cargo-route tension kept vehicle overlays visible for another cycle.
      - target: glass_tower_compact
        metric: public_trust
        delta: 2
        public_reason: A bounded contract rollback regained some public confidence after receipt publication.
    package_pressure:
      - package_id: debt-ledger-visibility
        pressure: 8
        status: candidate
      - package_id: drone-logistics-overlay
        pressure: 7
        status: candidate
      - package_id: rumor-filter-ops
        pressure: 6
        status: candidate
e2e:
  deterministic_tick_seed: emerald-sprawl-turn-0001
  first_tick_already_run: true
  expected_current_turn: 1
  expected_receipt_id: ledger_tick_0001_preseeded
