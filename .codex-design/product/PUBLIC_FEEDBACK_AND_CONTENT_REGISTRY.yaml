version: 1
owner: chummer6-design
status: accepted_design_posture
purpose: Machine-readable registry for public feedback, roadmap, changelog, and public-content optimization surfaces.

surfaces:
  - key: productlift_public_feedback
    vendor: ProductLift
    class: C4
    owner_repo: chummer6-hub
    policy_source: products/chummer/PRODUCTLIFT_FEEDBACK_ROADMAP_BRIDGE.md
    public_path: /feedback
    fallback_path: /help/feedback
    role: public_feedback_and_voting
    truth_posture: projection_only
    routes_to:
      - executive-assistant
      - product_governor
      - chummer6-design
    forbidden:
      - support_case_truth
      - release_truth
      - canonical_roadmap_truth
      - implementation_priority
      - rules_truth
      - campaign_truth
      - world_truth
      - private_logs
      - account_data

  - key: productlift_public_roadmap
    vendor: ProductLift
    class: C4
    owner_repo: chummer6-hub
    policy_source: products/chummer/PRODUCTLIFT_FEEDBACK_ROADMAP_BRIDGE.md
    public_path: /roadmap
    fallback_path: /horizons
    role: roadmap_projection
    truth_posture: projection_only
    canonical_source:
      - products/chummer/README.md
      - products/chummer/HORIZON_REGISTRY.yaml
      - products/chummer/PROGRAM_MILESTONES.yaml
      - products/chummer/NEXT_20_BIG_WINS_REGISTRY.yaml
      - products/chummer/POST_AUDIT_NEXT_20_BIG_WINS_REGISTRY.yaml

  - key: productlift_changelog
    vendor: ProductLift
    class: C4
    owner_repo: chummer6-hub
    policy_source: products/chummer/PRODUCTLIFT_FEEDBACK_ROADMAP_BRIDGE.md
    public_path: /changelog
    fallback_path: /now
    role: changelog_projection_and_voter_notification
    truth_posture: projection_only
    canonical_source:
      - products/chummer/RELEASE_PIPELINE.md
      - products/chummer/PUBLIC_RELEASE_EXPERIENCE.yaml
      - products/chummer/RELEASE_EVIDENCE_PACK.md
      - public_closeout_packets

  - key: katteb_public_guide_audit
    vendor: Katteb
    class: D2
    owner_repo: chummer6-hub
    synthesis_repo: executive-assistant
    policy_source: products/chummer/KATTEB_PUBLIC_GUIDE_OPTIMIZATION_LANE.md
    role: public_content_audit_and_optimization
    truth_posture: drafting_only
    canonical_source:
      - products/chummer/PUBLIC_GUIDE_POLICY.md
      - products/chummer/PUBLIC_GUIDE_EXPORT_MANIFEST.yaml
      - products/chummer/PUBLIC_GUIDE_PAGE_REGISTRY.yaml
      - products/chummer/PUBLIC_PART_REGISTRY.yaml
      - products/chummer/PUBLIC_FAQ_REGISTRY.yaml
      - products/chummer/PUBLIC_HELP_COPY.md
    forbidden:
      - generated_guide_direct_edit
      - rules_truth
      - support_case_replies
      - private_campaign_content
      - raw_sourcebook_text
      - unreviewed_publication

search_visibility_tools:
  - key: clickrank_public_site_audit
    vendor: ClickRank
    class: D3
    owner_repo: chummer6-hub
    supporting_repos:
      - chummer6-design
      - executive-assistant
      - fleet
    policy_source: products/chummer/PUBLIC_SITE_VISIBILITY_AND_SEARCH_OPTIMIZATION.md
    role: seo_ai_search_site_health
    truth_posture: audit_and_recommendation_only
    plan:
      tier: AppSumo Tier 4
      websites: 8
      users: 4
      crawled_page_capacity: 5000
      crawl_interval: monthly
      crawl_budget_rule: curated_public_launch_pages_first
    allowed_surfaces:
      - chummer.run public pages
      - generated public guide durable pages
      - feedback roadmap changelog pages
      - public artifact pages
      - public horizon explainers
    initial_crawl_paths:
      - /
      - /downloads
      - /help
      - /feedback
      - /roadmap
      - /changelog
      - /status
      - /what-is-chummer
      - /build
      - /gm-tools
      - /open-runs
      - /community-hub
      - /black-ledger
      - /karma-forge
      - /table-pulse
      - /creator-publishing
      - /from-chummer5a
    allowed_recommendations:
      - title_tags
      - meta_descriptions
      - image_alt_text
      - schema_suggestions
      - broken_link_reports
      - heading_hierarchy
      - internal_link_suggestions
      - crawl_and_indexability_fixes
      - ai_search_visibility_findings
    forbidden:
      - direct_generated_guide_mutation
      - roadmap_truth
      - release_truth
      - support_truth
      - rules_truth
      - campaign_truth
      - world_truth
      - unshipped_feature_claims
      - invented_product_promises
    review_required_for:
      - copy_changes
      - title_tag_changes_with_product_claims
      - meta_descriptions_with_availability_claims
      - schema_that_declares_feature_status
      - internal_links_to_horizon_or_future_surfaces

content_targets:
  - key: what_is_chummer6
    kind: article
    source_refs:
      - products/chummer/VISION.md
      - products/chummer/README.md
      - products/chummer/PUBLIC_USER_MODEL.md
    owner_repo: chummer6-hub
    review_required: true

  - key: download_and_install_chummer6
    kind: article
    source_refs:
      - products/chummer/PUBLIC_DOWNLOADS_POLICY.md
      - products/chummer/PUBLIC_AUTO_UPDATE_POLICY.md
      - products/chummer/DESKTOP_PLATFORM_ACCEPTANCE_MATRIX.yaml
    owner_repo: chummer6-hub
    review_required: true

  - key: how_chummer_explains_shadowrun_math
    kind: article
    source_refs:
      - products/chummer/BUILD_LAB_PRODUCT_MODEL.md
      - products/chummer/SUPPORT_PACKET_AND_CALCULATION_REPORT_UX.md
    owner_repo: chummer6-hub
    review_required: true

  - key: karma_forge_house_rules
    kind: article
    source_refs:
      - products/chummer/KARMA_FORGE_DISCOVERY_AND_HOUSE_RULE_INTAKE.md
      - products/chummer/RULE_ENVIRONMENT_AND_AMEND_SYSTEM.md
    owner_repo: chummer6-design
    review_required: true

  - key: black_ledger_living_world
    kind: article
    source_refs:
      - products/chummer/BLACK_LEDGER_MVP_001.md
      - products/chummer/OPEN_RUNS_AND_COMMUNITY_HUB.md
    owner_repo: chummer6-hub
    review_required: true

  - key: chummer5a_migration
    kind: article
    source_refs:
      - products/chummer/CHUMMER5A_FAMILIARITY_BRIDGE.md
      - products/chummer/INTEROP_AND_PORTABILITY_MODEL.md
    owner_repo: chummer6-hub
    review_required: true

closeout_requirements:
  productlift_shipped_item:
    required:
      - closeout_packet
      - release_or_public_availability_proof
      - voter_notification_allowed
      - public_changelog_entry_or_no_entry_reason
      - no_support_release_or_roadmap_contradiction
  katteb_accepted_change:
    required:
      - source_packet
      - upstream_design_or_registry_change
      - generated_guide_or_public_page_regeneration
      - reviewer
      - approval_owner
