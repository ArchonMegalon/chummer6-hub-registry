guest_gate_heading: Public access
guest_gate_summary: Open downloads. Create an account only when you want linked recovery, support history, or account return.
guest_gate_primary_label: Open downloads
guest_gate_secondary_label: Already have an account? Sign in
signed_in_dispatch_heading: Linked install
signed_in_dispatch_summary: Use the published installer for this device. Claim your copy online after download or first launch.
signed_in_dispatch_steps:
  - Start from the public download or signed-in claim page for the platform you are installing.
  - Follow the platform-specific guided install path; when macOS needs the setup lane, that path begins with a short-lived Terminal install command.
  - First launch must offer a clear claim path and a clear continue-unlinked path; closing the claim window keeps the app open as an unlinked install.
  - The happy path must apply the install claim automatically from the online claim page instead of depending on a manual claim-code ritual.
  - If Chummer reports missing rule packs or amend packages during restore, follow the explicit recovery guidance before trusting the restored result.
  - Reopen Devices and access later only for recovery, relinking, or support follow-through.
install_steps:
  - Download the current published package for your platform.
  - Finish setup for that package, then launch Chummer.
  - Create an account when you want download history, recovery, and support history to stay attached; otherwise continue unlinked.
  - If a restored runner or campaign needs rule packs or amend packages that are not present locally, Chummer must say so before compute continues.
  - Use Devices and access later if you need to reconnect a downloaded copy back to the same account.
account_required_install_steps:
  - Create your Chummer account first.
  - Start the published download from the signed-in handoff page.
  - Finish setup for that package and launch Chummer.
  - Follow the platform-specific guided install path where one exists; macOS setup continuity begins with a Terminal command only when that guided setup lane is the active route.
  - Resolve any shown rule-environment or package mismatch before trusting the restored workspace.
  - Let the happy path attach the install automatically from the online claim page; if the user closes the claim window, keep the install local and unlinked instead of blocking startup.
windows_requirements:
  - 64-bit Windows 10 or newer.
  - Enough free disk space for the installed release plus future updates.
  - A normal user install path; no custom runtime selection needed for the recommended build.
linux_requirements:
  - 64-bit Linux with the currently published package support.
  - Use the current public package when available; use manual packages only for advanced or support-directed setup.
  - Linux remains inside the current rolling public release scope and should always point at the newest successful public package lane.
  - Arch-based distributions should receive an AUR package projection when the Linux packaging lane is ready; converting `.deb` packages is not the flagship path.
macos_requirements:
  - The public downloads page may expose a macOS guided setup lane when needed, but the promoted shelf route is the signed, notarized DMG installer.
  - The Mac default action is a Terminal command, not a downloaded unsigned `.command` file and not the raw DMG. The command must stream a guided setup assistant that downloads the current DMGs, removes quarantine, lets the user choose which supported desktop heads to install, lets the user choose `/Applications` versus `~/Applications`, and offers to open the selected apps when setup finishes.
  - The guided setup assistant must apply install claiming automatically on first launch or route the user to the online claim page instead of asking the user to copy codes by hand.
  - Guest-visible macOS downloads should stay tied to the promoted signed and notarized installer record, not a preview-coded lane.
