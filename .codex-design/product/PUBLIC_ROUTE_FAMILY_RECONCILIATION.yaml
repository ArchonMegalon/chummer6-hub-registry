version: 1
last_reviewed: 2026-05-13
purpose: Canonical route-family classification for the public Hub surface so package, mobile, account, and operator rails stay reconciled across design, Hub, and route proof.
route_families:
  packages:
    launch_state: launch_present
    public_manifest: true
    hub_routes: true
    docs_surface: true
    route_proof: live_strict_required
    owner_repo: chummer6-hub-registry
    routes:
      - /packages
      - /packages/{packageId}
      - /packages/{packageId}/vote
      - /packages/{packageId}/follow
  mobile_pwa_play:
    launch_state: preview_present
    public_manifest: true
    hub_routes: true
    docs_surface: true
    route_proof: live_strict_required
    owner_repo: chummer6-mobile
    routes:
      - /mobile
      - /pwa
      - /play
      - /player
      - /gm
      - /observer
      - /session
  account_packages:
    launch_state: account_only
    public_manifest: registered_routes
    hub_routes: true
    docs_surface: true
    route_proof: account_surface_only
    owner_repo: chummer6-hub
    routes:
      - /account/packages
      - /account/packages/{packageId}
  admin_packages:
    launch_state: operator_only
    public_manifest: false
    operator_manifest: true
    hub_routes: true
    docs_surface: true
    route_proof: operator_surface_only
    owner_repo: chummer6-hub
    routes:
      - /admin/packages
